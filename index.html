<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Retro Gaming Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Pixel Arcade</h1>
        <p>Select a game to start playing!</p>
    </header>

    <main class="game-grid">
        <div class="game-card">
            <img src="https://via.placeholder.com/150" alt="Game 1">
            <h3>Space Invaders</h3>
            <a href="games/space-invaders/index.html" class="play-btn">Play Now</a>
        </div>

        <div class="game-card">
            <img src="https://via.placeholder.com/150" alt="Game 2">
            <h3>Dino Run</h3>
            <a href="games/dino-run/index.html" class="play-btn">Play Now</a>
        </div>

        <div class="game-card add-new">
            <span>+</span>
            <p>Add New Game</p>
        </div>
    </main>

</body>
</html>
